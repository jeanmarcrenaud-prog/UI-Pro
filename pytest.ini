[pytest]
testpaths = tests
python_files = test_*.py */test_*.py
python_functions = test_*
python_classes = Test*

markers =
    unit: unit tests (fast, isolated)
    integration: integration tests (require dependencies)
    e2e: end-to-end tests (slow, full stack)
    slow: tests that take >1s
    quick: tests that complete <1s

# Output settings
addopts = 
    -v
    --tb=short
    -ra

filterwarnings =
    error
    ignore::DeprecationWarning

# Coverage settings
[coverage:run]
source = ui-pro
branch = true

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    def __repr__
    raise AssertionError
    raise NotImplementedError