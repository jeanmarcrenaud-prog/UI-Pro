
# mypy.ini - Type checker configuration

[mypy]
# Strict mode enabled
strict = True
python_version = 3.10
show_error_codes = True
show_error_context = True

# Show warnings that might be relevant
warn_no_return = True
warn_return_any = True
warn_unreachable = True
warn_unused_ignores = True
warn_unused_configs = True

# Don't allow implicit option relaxation
ignore_missing_imports = False

[types-pydantic]
# Pydantic v2
ignore_missing_imports = True

[types-requests]
# Requests library
ignore_missing_imports = True

[types-fastapi]
# FastAPI
ignore_missing_imports = True

# Disable for common ML libraries
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-setuptools.*]
ignore_missing_imports = True
