
# mypy.ini - Type checker configuration

[mypy]
# Relaxed mode for compatibility
python_version = 3.10
show_error_codes = True

# Ignore missing imports for external libraries
ignore_missing_imports = True

# Exclude workspace (user generated code - not part of the app)
exclude = [workspace/]

[types-pydantic]
# Pydantic v2
ignore_missing_imports = True

[types-requests]
# Requests library
ignore_missing_imports = True

[types-fastapi]
# FastAPI
ignore_missing_imports = True

# Disable for common ML libraries
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-setuptools.*]
ignore_missing_imports = True
